<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; padding: 40px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th { background: #f1f3f5; color: #495057; text-align: left; padding: 15px; border-bottom: 2px solid #dee2e6; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .action-section { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; background: #f1f3f5; padding: 25px; border-radius: 10px; }
        .form-group h3 { margin-top: 0; color: #2c3e50; font-size: 18px; }
        input { padding: 10px; width: 100%; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: 600; width: 100%; }
        .btn-update { background: #f39c12; }
        .btn-delete { background: #e74c3c; }
        .btn-search { background: #34495e; margin-bottom: 20px; }
        .add-link { background: #3498db; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h1>Student Directory</h1>
        <a href="{% url 'regi' %}" class="add-link">+ Add Student</a>
    </div>

    <form method="GET" action="{% url 'home' %}" style="margin-bottom: 30px;">
        <div style="display: flex; gap: 10px;">
            <input type="text" name="id" placeholder="Filter by Roll Number...">
            <button type="submit" class="btn btn-search" style="width: auto;">Search</button>
        </div>
    </form>

    <table>
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Roll Number</th>
                <th>Access Key</th>
            </tr>
        </thead>
        <tbody>
            {% for s in students %}
            <tr>
                <td><strong>{{ s.studentname }}</strong></td>
                <td>{{ s.rollnumber }}</td>
                <td><code style="color: #e83e8c;">{{ s.password }}</code></td>
            </tr>
            {% empty %}
            <tr><td colspan="3" style="text-align: center; color: #999;">No records found.</td></tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="action-section">
        <div class="form-group">
            <h3>Update Records</h3>
            <form method="POST" action="{% url 'update' %}">
                {% csrf_token %}
                <input type="text" name="id" placeholder="Target Roll Number" required>
                <input type="text" name="update" placeholder="New Full Name">
                <input type="text" name="new_roll_input" placeholder="New Roll Number">
                <button type="submit" class="btn btn-update">Save Changes</button>
            </form>
        </div>

        <div class="form-group">
            <h3>Remove Record</h3>
            <form method="POST" action="{% url 'delete' %}">
                {% csrf_token %}
                <input type="text" name="id" placeholder="Roll Number to Delete" required>
                <p style="font-size: 12px; color: #e74c3c;">Warning: This action cannot be undone.</p>
                <button type="submit" class="btn btn-delete">Delete Permanently</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
